name: nyc-taxi-assessment
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # Core data processing
  - pandas>=2.1
  - numpy>=1.26
  - pyarrow>=15.0
  - scipy>=1.12
  # Geospatial
  - geopandas>=0.14
  - shapely>=2.0
  # Visualisation
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.18
  # Dashboard
  - streamlit>=1.31
  # Development
  - jupyter>=1.0
  - scikit-learn>=1.3
  - pytest>=8.0
  - black>=24.0
  - ipykernel
  - pip
  - pip:
    - reportlab>=4.0
    - python-docx>=1.1
    - docxcompose>=1.4         # merge dissertation Ch1-3 + Ch4-6 into full doc
    - kaleido>=0.2.1
    - jinja2>=3.1
